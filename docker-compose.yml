services:
  api:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
    ports:
      - "5000:8080"
    volumes:
      - db-data:/app/data
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/insurancepolicy.db

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  db-data:
