name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/InsurancePolicyManager.sln

      - name: Build
        run: dotnet build backend/InsurancePolicyManager.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/InsurancePolicyManager.sln --no-build --configuration Release
